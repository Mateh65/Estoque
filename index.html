<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque PRO</title>

<style>
body { margin:0; font-family: Arial; background:#f3f4f6; }

/* HEADER */
header { padding:20px; }
.title { font-size:26px; font-weight:bold; }
.subtitle { font-size:12px; color:#777; }

/* DASHBOARD */
.dashboard {
  display:flex;
  gap:10px;
  padding:0 15px;
}
.card {
  flex:1;
  background:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* MENU */
.menu {
  display:flex;
  margin:15px;
  background:#ddd;
  border-radius:10px;
}
.menu button {
  flex:1;
  padding:10px;
  border:none;
  background:none;
}
.active {
  background:#065f46;
  color:#fff;
  border-radius:10px;
}

/* CONTEÚDO */
.container { padding:15px; }
.box {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#065f46;
  color:white;
}

.item {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div class="subtitle">CONTROLE DE INVENTÁRIO</div>
  <div class="title">Estoque<span style="color:#065f46;">App</span></div>
</header>

<div class="dashboard">
  <div class="card"><h2 id="p">0</h2><small>Produtos</small></div>
  <div class="card"><h2 id="u">0</h2><small>Unidades</small></div>
  <div class="card"><h2 id="z">0</h2><small>Zerados</small></div>
</div>

<div class="menu">
  <button onclick="trocar('estoque')" class="active">Estoque</button>
  <button onclick="trocar('mov')">Movimentação</button>
  <button onclick="trocar('cat')">Categorias</button>
  <button onclick="trocar('hist')">Histórico</button>
</div>

<div class="container" id="conteudo"></div>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let categorias = JSON.parse(localStorage.getItem("categorias")) || [];
let historico = JSON.parse(localStorage.getItem("historico")) || [];

function salvar(){
  localStorage.setItem("produtos", JSON.stringify(produtos));
  localStorage.setItem("categorias", JSON.stringify(categorias));
  localStorage.setItem("historico", JSON.stringify(historico));
}

/* TROCAR TELA */
function trocar(tela){
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  if(tela=="estoque") telaEstoque();
  if(tela=="mov") telaMov();
  if(tela=="cat") telaCat();
  if(tela=="hist") telaHist();
}

/* ESTOQUE */
function telaEstoque(){
  conteudo.innerHTML = `
    <div class="box">
      <h3>Adicionar Produto</h3>
      <input id="nome" placeholder="Nome">
      <select id="categoria"></select>
      <input id="qtd" type="number" placeholder="Quantidade">
      <button onclick="addProduto()">Adicionar</button>
    </div>
    <div id="lista"></div>
  `;

  let sel = document.getElementById("categoria");
  categorias.forEach(c => sel.innerHTML += `<option>${c}</option>`);

  listarProdutos();
}

function addProduto(){
  let nome = nomeInput.value;
  let qtd = parseInt(qtdInput.value);
  let cat = categoria.value;

  produtos.push({nome,qtd,cat});
  salvar();
  telaEstoque();
}

function listarProdutos(){
  let lista = document.getElementById("lista");
  lista.innerHTML="";

  produtos.forEach((p,i)=>{
    lista.innerHTML += `
      <div class="item">
        <b>${p.nome}</b><br>
        Categoria: ${p.cat}<br>
        Qtd: ${p.qtd}<br><br>
        <button onclick="mov(${i},1)">Entrada</button>
        <button onclick="mov(${i},-1)">Saída</button>
      </div>
    `;
  });

  atualizarDash();
}

/* MOVIMENTAÇÃO */
function telaMov(){
  conteudo.innerHTML = "<div class='box'>Use os botões no estoque</div>";
}

/* CATEGORIAS */
function telaCat(){
  conteudo.innerHTML = `
    <div class="box">
      <h3>Nova Categoria</h3>
      <input id="novaCat">
      <button onclick="addCat()">Adicionar</button>
    </div>
    <div id="cats"></div>
  `;

  let div = document.getElementById("cats");
  categorias.forEach(c => div.innerHTML += `<div class="item">${c}</div>`);
}

function addCat(){
  categorias.push(novaCat.value);
  salvar();
  telaCat();
}

/* HISTÓRICO */
function telaHist(){
  conteudo.innerHTML = "<div id='hist'></div>";
  let div = document.getElementById("hist");

  historico.forEach(h=>{
    div.innerHTML += `<div class="item">${h}</div>`;
  });
}

/* MOVIMENTAÇÃO */
function mov(i,val){
  produtos[i].qtd += val;
  historico.push(produtos[i].nome + " " + (val>0?"ENTRADA":"SAÍDA"));
  salvar();
  listarProdutos();
}

/* DASHBOARD */
function atualizarDash(){
  let total=0, zerados=0;
  produtos.forEach(p=>{
    total+=p.qtd;
    if(p.qtd<=0) zerados++;
  });

  p.innerText = produtos.length;
  u.innerText = total;
  z.innerText = zerados;
}

telaEstoque();
</script>

</body>
</html>
