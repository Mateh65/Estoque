<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body { margin:0; font-family: Arial; background:#f3f4f6; }

header { padding:20px; }
.title { font-size:26px; font-weight:bold; }
.subtitle { font-size:12px; color:#777; }

.dashboard {
  display:flex;
  gap:10px;
  padding:0 15px;
}
.card {
  flex:1;
  background:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.menu {
  display:flex;
  margin:15px;
  background:#ddd;
  border-radius:10px;
}
.menu button {
  flex:1;
  padding:10px;
  border:none;
  background:none;
}
.active {
  background:#065f46;
  color:#fff;
  border-radius:10px;
}

.container { padding:15px; }

.box {
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#065f46;
  color:white;
}

.item {
  background:#fff;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<header>
  <div class="subtitle">CONTROLE DE INVENTÁRIO</div>
  <div class="title">Estoque<span style="color:#065f46;">App</span></div>
</header>

<div class="dashboard">
  <div class="card"><h2 id="p">0</h2><small>Produtos</small></div>
  <div class="card"><h2 id="u">0</h2><small>Unidades</small></div>
  <div class="card"><h2 id="z">0</h2><small>Zerados</small></div>
</div>

<div class="menu">
  <button onclick="trocar('estoque')" class="active">Estoque</button>
  <button onclick="trocar('hist')">Histórico</button>
</div>

<div class="container" id="conteudo"></div>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let historico = JSON.parse(localStorage.getItem("historico")) || [];

function salvar(){
  localStorage.setItem("produtos", JSON.stringify(produtos));
  localStorage.setItem("historico", JSON.stringify(historico));
}

/* TROCAR TELA */
function trocar(tela){
  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");

  if(tela=="estoque") telaEstoque();
  if(tela=="hist") telaHist();
}

/* ESTOQUE */
function telaEstoque(){
  conteudo.innerHTML = `
    <div class="box">
      <h3>Adicionar Produto</h3>
      <input id="nome" placeholder="Nome">
      <input id="qtd" type="number" placeholder="Quantidade">
      <button onclick="addProduto()">Adicionar</button>
      <button onclick="gerarPDF()">📄 Gerar Relatório PDF</button>
    </div>
    <div id="lista"></div>
  `;
  listarProdutos();
}

function addProduto(){
  let nome = nomeInput.value;
  let qtd = parseInt(qtdInput.value);

  if(!nome || !qtd) return alert("Preencha os dados");

  produtos.push({nome,qtd});
  salvar();
  telaEstoque();
}

function listarProdutos(){
  let lista = document.getElementById("lista");
  lista.innerHTML="";

  produtos.forEach((p,i)=>{
    lista.innerHTML += `
      <div class="item">
        <b>${p.nome}</b><br>
        Qtd: ${p.qtd}<br><br>
        <button onclick="mov(${i},1)">Entrada</button>
        <button onclick="mov(${i},-1)">Saída</button>
      </div>
    `;
  });

  atualizarDash();
}

/* MOVIMENTAÇÃO COM RESPONSÁVEL */
function mov(i,val){
  let responsavel = prompt("Nome do responsável:");
  let qtd = parseInt(prompt("Quantidade:"));

  if(!responsavel || !qtd) return;

  if(val < 0 && produtos[i].qtd < qtd){
    return alert("Estoque insuficiente");
  }

  produtos[i].qtd += (val > 0 ? qtd : -qtd);

  historico.push({
    produto: produtos[i].nome,
    tipo: val > 0 ? "ENTRADA" : "SAÍDA",
    qtd: qtd,
    responsavel: responsavel,
    data: new Date().toLocaleString()
  });

  salvar();
  listarProdutos();
}

/* HISTÓRICO */
function telaHist(){
  conteudo.innerHTML = "<div id='hist'></div>";
  let div = document.getElementById("hist");

  historico.forEach(h=>{
    div.innerHTML += `
      <div class="item">
        <b>${h.produto}</b><br>
        Tipo: ${h.tipo}<br>
        Qtd: ${h.qtd}<br>
        Resp: ${h.responsavel}<br>
        Data: ${h.data}
      </div>
    `;
  });
}

/* DASHBOARD */
function atualizarDash(){
  let total=0, zerados=0;

  produtos.forEach(p=>{
    total+=p.qtd;
    if(p.qtd<=0) zerados++;
  });

  p.innerText = produtos.length;
  u.innerText = total;
  z.innerText = zerados;
}

/* PDF PROFISSIONAL */
function gerarPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("RELATÓRIO DE ESTOQUE", 10, 15);

  doc.setFontSize(10);
  doc.text("Gerado em: " + new Date().toLocaleString(), 10, 22);

  let y = 30;

  produtos.forEach(p => {
    doc.setFontSize(12);
    doc.text("Produto: " + p.nome, 10, y);
    doc.text("Quantidade: " + p.qtd, 10, y+6);
    y += 15;
  });

  doc.save("estoque.pdf");
}

telaEstoque();
</script>

</body>
</html>
