<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque PRO</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: #fff;
  margin: 0;
}

header {
  background: #e11d48;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

input, button {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: none;
}

button {
  background: #e11d48;
  color: white;
  font-weight: bold;
}

.card {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.low {
  border: 2px solid red;
}

.top {
  display: flex;
  justify-content: space-between;
}

.small-btn {
  width: 48%;
}

.search {
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>📦 Estoque PRO</header>

<div class="container">

<input id="search" class="search" placeholder="Buscar produto..." onkeyup="listar()">

<input id="nome" placeholder="Nome do produto">
<input id="qtd" type="number" placeholder="Quantidade">
<input id="custo" type="number" placeholder="Valor de custo">
<input id="venda" type="number" placeholder="Valor de venda">

<button onclick="adicionar()">Adicionar Produto</button>

<h3 id="total"></h3>

<div id="lista"></div>

</div>

<script>
let produtos = JSON.parse(localStorage.getItem("estoque")) || [];

function salvar() {
  localStorage.setItem("estoque", JSON.stringify(produtos));
}

function adicionar() {
  let nome = nomeInput.value;
  let qtd = parseInt(qtdInput.value);
  let custo = parseFloat(custoInput.value);
  let venda = parseFloat(vendaInput.value);

  if (!nome || !qtd) return alert("Preencha os dados");

  produtos.push({ nome, qtd, custo, venda });
  salvar();
  limpar();
  listar();
}

function limpar() {
  nomeInput.value = "";
  qtdInput.value = "";
  custoInput.value = "";
  vendaInput.value = "";
}

function entrada(i) {
  produtos[i].qtd++;
  salvar();
  listar();
}

function saida(i) {
  if (produtos[i].qtd > 0) produtos[i].qtd--;
  salvar();
  listar();
}

function excluir(i) {
  if (confirm("Excluir produto?")) {
    produtos.splice(i, 1);
    salvar();
    listar();
  }
}

function listar() {
  let lista = document.getElementById("lista");
  let busca = document.getElementById("search").value.toLowerCase();
  lista.innerHTML = "";

  let totalLucro = 0;

  produtos.forEach((p, i) => {
    if (!p.nome.toLowerCase().includes(busca)) return;

    let lucro = (p.venda - p.custo) * p.qtd;
    totalLucro += lucro;

    lista.innerHTML += `
      <div class="card ${p.qtd <= 2 ? 'low' : ''}">
        <div class="top">
          <b>${p.nome}</b>
          <button onclick="excluir(${i})">🗑️</button>
        </div>

        Estoque: ${p.qtd}<br>
        Lucro total: R$ ${lucro.toFixed(2)}<br><br>

        <div class="top">
          <button class="small-btn" onclick="entrada(${i})">+ Entrada</button>
          <button class="small-btn" onclick="saida(${i})">- Saída</button>
        </div>
      </div>
    `;
  });

  document.getElementById("total").innerText = 
    "💰 Lucro total: R$ " + totalLucro.toFixed(2);
}

listar();
</script>

</body>
</html>
