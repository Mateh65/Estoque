<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque PRO</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f1f5f9;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#0f172a;
  color:white;
  height:100vh;
  padding:20px;
}

.sidebar button {
  width:100%;
  margin-bottom:10px;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#1e293b;
  color:white;
  text-align:left;
}

.sidebar button.active {
  background:#10b981;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* DASH */
.dashboard {
  display:flex;
  gap:15px;
}

.card {
  flex:1;
  background:white;
  padding:20px;
  border-radius:15px;
}

/* BOX */
.box {
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:20px;
}

/* INPUT */
input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

/* BUTTON */
button.action {
  background:#10b981;
  color:white;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  width:100%;
  cursor:pointer;
}

.item {
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>📦 Estoque</h2>
  <button onclick="trocar('estoque', this)" class="active">Estoque</button>
  <button onclick="trocar('mov', this)">Saída</button>
  <button onclick="trocar('hist', this)">Histórico</button>
</div>

<div class="main">

  <div class="dashboard">
    <div class="card"><h3 id="p">0</h3>Produtos</div>
    <div class="card"><h3 id="u">0</h3>Unidades</div>
    <div class="card"><h3 id="z">0</h3>Zerados</div>
  </div>

  <div id="conteudo"></div>

</div>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let historico = JSON.parse(localStorage.getItem("historico")) || [];
let itensSaida = [];

/* SALVAR */
function salvar(){
  localStorage.setItem("produtos", JSON.stringify(produtos));
  localStorage.setItem("historico", JSON.stringify(historico));
}

/* MENU */
function trocar(tela, el){
  document.querySelectorAll(".sidebar button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");

  if(tela=="estoque") telaEstoque();
  if(tela=="mov") telaMov();
  if(tela=="hist") telaHist();
}

/* ESTOQUE */
function telaEstoque(){
  conteudo.innerHTML = `
    <div class="box">
      <h3>Adicionar Produto</h3>
      <input id="nome" placeholder="Nome">
      <input id="qtd" type="number" placeholder="Quantidade">
      <button class="action" onclick="addProduto()">Adicionar</button>
    </div>

    <div id="lista"></div>
  `;
  listar();
}

function addProduto(){
  let nome = document.getElementById("nome").value;
  let qtd = parseInt(document.getElementById("qtd").value);

  if(!nome || !qtd) return alert("Preencha");

  produtos.push({nome,qtd});
  salvar();
  telaEstoque();
}

function listar(){
  let lista = document.getElementById("lista");
  lista.innerHTML="";

  produtos.forEach((p)=>{
    lista.innerHTML += `
      <div class="item">
        <b>${p.nome}</b><br>
        Qtd: ${p.qtd}
      </div>
    `;
  });

  atualizar();
}

/* SAÍDA */
function telaMov(){
  let agora = new Date().toLocaleString();

  conteudo.innerHTML = `
    <div class="box">
      <h3>📦 Nova Saída</h3>

      <input id="evento" placeholder="Evento / Local">
      <input id="resp" placeholder="Responsável">

      <small>🕒 ${agora}</small>

      <select id="prodSel"></select>
      <input id="qtdItem" type="number" placeholder="Quantidade">

      <button class="action" onclick="addItem()">Adicionar Item</button>

      <div id="listaItens"></div>

      <button class="action" onclick="finalizarSaida()">Finalizar Saída</button>
    </div>
  `;

  let sel = document.getElementById("prodSel");
  produtos.forEach((p,i)=>{
    sel.innerHTML += `<option value="${i}">${p.nome}</option>`;
  });

  itensSaida = [];
}

function addItem(){
  let i = document.getElementById("prodSel").value;
  let qtd = parseInt(document.getElementById("qtdItem").value);

  if(!qtd) return alert("Informe quantidade");
  if(produtos[i].qtd < qtd) return alert("Sem estoque");

  itensSaida.push({index:i, nome:produtos[i].nome, qtd});

  atualizarListaItens();
}

function atualizarListaItens(){
  let div = document.getElementById("listaItens");
  div.innerHTML = "";

  itensSaida.forEach((item, index)=>{
    div.innerHTML += `
      <div style="background:#fff;padding:12px;border-radius:10px;margin-top:10px;display:flex;justify-content:space-between;">
        <div>
          <b>${item.nome}</b><br>
          Quantidade: ${item.qtd}
        </div>
        <button onclick="removerItem(${index})" style="background:red;color:#fff;border:none;border-radius:6px;padding:5px 10px;">X</button>
      </div>
    `;
  });
}

function removerItem(i){
  itensSaida.splice(i,1);
  atualizarListaItens();
}

function finalizarSaida(){
  let evento = document.getElementById("evento").value;
  let resp = document.getElementById("resp").value;
  let data = new Date().toLocaleString();

  if(!evento || !resp || itensSaida.length==0){
    return alert("Preencha tudo");
  }

  itensSaida.forEach(i=>{
    produtos[i.index].qtd -= i.qtd;
  });

  let registro = {
    tipo:"SAIDA",
    evento,
    responsavel:resp,
    itens:itensSaida,
    data
  };

  historico.push(registro);

  gerarPDFSaida(registro);

  salvar();
  telaEstoque();
}

/* PDF */
function gerarPDFSaida(reg){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(16);
  doc.text("ORDEM DE SAÍDA", 10, 10);

  doc.setFontSize(10);
  doc.text("Evento: " + reg.evento, 10, 20);
  doc.text("Responsável: " + reg.responsavel, 10, 26);
  doc.text("Data: " + reg.data, 10, 32);

  let y = 40;

  reg.itens.forEach(i=>{
    doc.text(`${i.nome} - ${i.qtd}`, 10, y);
    y += 8;
  });

  y += 20;
  doc.text("Assinatura: ______________________", 10, y);

  doc.save("saida.pdf");
}

/* HISTÓRICO */
function telaHist(){
  conteudo.innerHTML = `
    <input id="busca" placeholder="Buscar evento..." onkeyup="filtrar()">
    <div id="h"></div>
  `;

  renderHist(historico);
}

function renderHist(lista){
  let h = document.getElementById("h");
  h.innerHTML="";

  lista.forEach(reg=>{
    let itens = reg.itens.map(i=>`${i.nome} (${i.qtd})`).join(", ");

    h.innerHTML += `
      <div class="item">
        <b>📍 ${reg.evento}</b><br>
        👷 ${reg.responsavel}<br>
        📦 ${itens}<br>
        🕒 ${reg.data}
      </div>
    `;
  });
}

function filtrar(){
  let termo = document.getElementById("busca").value.toLowerCase();
  let filtrado = historico.filter(h=>h.evento.toLowerCase().includes(termo));
  renderHist(filtrado);
}

/* DASH */
function atualizar(){
  let total=0, z=0;
  produtos.forEach(p=>{
    total+=p.qtd;
    if(p.qtd<=0) z++;
  });

  document.getElementById("p").innerText=produtos.length;
  document.getElementById("u").innerText=total;
  document.getElementById("z").innerText=z;
}

telaEstoque();
</script>

</body>
</html>
