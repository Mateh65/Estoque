<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estoque App</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f3f4f6;
  color: #333;
}

/* HEADER */
header {
  padding: 20px;
}

.title {
  font-size: 26px;
  font-weight: bold;
}

.subtitle {
  font-size: 12px;
  color: #6b7280;
  letter-spacing: 2px;
}

/* DASHBOARD */
.dashboard {
  display: flex;
  gap: 10px;
  padding: 0 15px;
}

.card-top {
  flex: 1;
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.card-top h2 {
  margin: 0;
}

.red { color: red; }

/* MENU */
.menu {
  display: flex;
  margin: 15px;
  background: #e5e7eb;
  border-radius: 10px;
  overflow: hidden;
}

.menu button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
  font-weight: bold;
}

.menu .active {
  background: #065f46;
  color: white;
}

/* FORM */
.container {
  padding: 15px;
}

.box {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button.add {
  margin-top: 10px;
  background: #065f46;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  width: 100%;
}

/* LISTA */
.item {
  background: white;
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
}

.low {
  border-left: 5px solid red;
}
</style>
</head>

<body>

<header>
  <div class="subtitle">CONTROLE DE INVENTÁRIO</div>
  <div class="title">Estoque<span style="color:#065f46;">App</span></div>
</header>

<div class="dashboard">
  <div class="card-top">
    <h2 id="produtos">0</h2>
    <small>PRODUTOS</small>
  </div>
  <div class="card-top">
    <h2 id="unidades">0</h2>
    <small>UNIDADES</small>
  </div>
  <div class="card-top">
    <h2 id="zerados" class="red">0</h2>
    <small>ZERADOS</small>
  </div>
</div>

<div class="menu">
  <button class="active">Estoque</button>
  <button>Movimentação</button>
  <button>Categorias</button>
  <button>Histórico</button>
</div>

<div class="container">
  <div class="box">

    <h4>ADICIONAR PRODUTO</h4>

    <input id="nome" placeholder="Nome do produto">
    <input id="qtd" type="number" placeholder="Quantidade">

    <button class="add" onclick="add()">+ Adicionar</button>

  </div>

  <div id="lista"></div>
</div>

<script>
let produtos = JSON.parse(localStorage.getItem("estoque")) || [];

function salvar() {
  localStorage.setItem("estoque", JSON.stringify(produtos));
}

function add() {
  let nome = nomeInput.value;
  let qtd = parseInt(qtdInput.value);

  if (!nome || !qtd) return alert("Preencha");

  produtos.push({ nome, qtd });
  salvar();
  listar();
}

function listar() {
  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let total = 0;
  let zerados = 0;

  produtos.forEach((p, i) => {
    total += p.qtd;
    if (p.qtd == 0) zerados++;

    lista.innerHTML += `
      <div class="item ${p.qtd <= 2 ? 'low' : ''}">
        <b>${p.nome}</b><br>
        Quantidade: ${p.qtd}<br><br>
        <button onclick="produtos[${i}].qtd++; salvar(); listar()">+</button>
        <button onclick="produtos[${i}].qtd--; salvar(); listar()">-</button>
      </div>
    `;
  });

  document.getElementById("produtos").innerText = produtos.length;
  document.getElementById("unidades").innerText = total;
  document.getElementById("zerados").innerText = zerados;
}

listar();
</script>

</body>
</html>
